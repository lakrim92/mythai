  <path d="M14 33 Q14 48 32 50 Q50 48 50 33" fill="none" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Baguettes -->
  <line x1="24" y1="12" x2="20" y2="32" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>
  <line x1="30" y1="10" x2="26" y2="31" stroke="#C8390B" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>
  <!-- Point déco -->
